name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '24'
      PYTHON_VERSION: '3.13'
      RUN_PRECOMMIT: 'true'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: 'false'

      # Hard guard: the automated Typist routine historically opened empty PRs
      # (e.g. #75, #78) when it mis-detected the "finalize" state. Fail fast
      # here so an empty diff can never pass CI.
      - name: Reject empty pull request
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          if git diff --quiet origin/${{ github.base_ref }}; then
            echo "::error::PR contains no changes. Empty PRs are not allowed."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # NAS C tests (make -C nas_proxy test) link against libcurl.
      - name: Install system dependencies (NAS C tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Show versions
        run: |
          node -v
          npm -v
          python -V
          gcc --version
          make --version

      - name: Install Node dependencies
        if: ${{ hashFiles('package.json') != '' }}
        run: npm ci

      # Python test/coverage deps for `make test-py` (pytest + pytest-cov).
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Single source of truth: Makefile precommit target (check-only).
      # Any new checks added locally must be added to 'make precommit'.
      # Note: the test-ebpf step requires a local Docker image (ebpf-builder)
      # and is intentionally ignored in the Makefile, so it is a no-op in CI.
      - name: Run precommit (single source of truth)
        if: ${{ env.RUN_PRECOMMIT == 'true' }}
        run: make precommit
