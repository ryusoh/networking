<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/popup.css" />
  </head>
  <body>
    <div class="header">
      <span class="title">Bypass: AdBlock</span>
      <label class="switch">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="section">
      <div class="title">Execution Mode</div>
      <select id="mode" style="width: 100%; padding: 5px; margin-bottom: 10px">
        <option value="all">Run on all sites</option>
        <option value="selective">Run only on selected sites (Blacklist)</option>
      </select>
    </div>

    <div class="section">
      <div class="title">Site Lists</div>
      <div class="desc">Toggle current site status:</div>
      <div style="display: flex; gap: 5px; margin-bottom: 10px">
        <button id="addWhitelist" style="background: #4caf50; font-size: 11px">Whitelist</button>
        <button id="addBlacklist" style="background: #2196f3; font-size: 11px">Blacklist</button>
        <button id="addJsBlock" style="background: #ff9800; font-size: 11px">Block JS</button>
      </div>
    </div>

    <div class="section">
      <div class="title">Features</div>
      <div class="feature-toggle">
        <span class="feature-name">Cookie Banner Blocker</span>
        <label class="mini-switch">
          <input type="checkbox" id="feature-cookieBanner" />
          <span class="mini-slider"></span>
        </label>
      </div>
      <div class="feature-toggle">
        <span class="feature-name">Social Media Blocker</span>
        <label class="mini-switch">
          <input type="checkbox" id="feature-socialMedia" />
          <span class="mini-slider"></span>
        </label>
      </div>
      <div class="feature-toggle">
        <span class="feature-name">YouTube Ad Blocker</span>
        <label class="mini-switch">
          <input type="checkbox" id="feature-youtube" />
          <span class="mini-slider"></span>
        </label>
      </div>
      <div class="feature-toggle">
        <span class="feature-name">Video Stream Ad Blocker</span>
        <label class="mini-switch">
          <input type="checkbox" id="feature-videoStream" />
          <span class="mini-slider"></span>
        </label>
      </div>
      <div class="feature-toggle">
        <span class="feature-name">Twitch Ad Blocker</span>
        <label class="mini-switch">
          <input type="checkbox" id="feature-twitch" />
          <span class="mini-slider"></span>
        </label>
      </div>
      <div class="feature-toggle">
        <span class="feature-name">Forum Ad Blocker</span>
        <label class="mini-switch">
          <input type="checkbox" id="feature-forum" />
          <span class="mini-slider"></span>
        </label>
      </div>
    </div>

    <div class="section">
      <button id="scan">Scan Current Page</button>
    </div>

    <div class="section">
      <button id="picker">Element Picker</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
