version: '3.8'

services:
  # High-performance proxy relay
  # This setup uses v2ray which is excellent for complex Chinese routing
  nas_proxy:
    image: v2fly/v2fly-core:latest
    container_name: nas_proxy
    restart: always
    ports:
      - '1080:1080' # SOCKS5 Port
      - '8080:8080' # HTTP Proxy Port
    volumes:
      - ./config:/etc/v2ray
    command: v2ray run -c /etc/v2ray/config.json

  # Alternative: Simple Squid Proxy (Uncomment to use instead of v2ray)
  # squid:
  #   image: ubuntu/squid:latest
  #   container_name: nas_squid
  #   restart: always
  #   ports:
  #     - "3128:3128"
