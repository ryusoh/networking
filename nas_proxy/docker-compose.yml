version: '3.8'

services:
  # High-performance proxy relay
  # This setup uses v2ray which is excellent for complex Chinese routing
  nas_proxy:
    image: v2fly/v2fly-core:latest
    container_name: nas_proxy
    restart: always
    ports:
      - '1080:1080' # SOCKS5 Port
      - '8080:8080' # HTTP Proxy Port
    volumes:
      - ./config:/etc/v2ray
    command: v2ray run -c /etc/v2ray/config.json

  # Network-wide ad blocking
  pihole:
    container_name: pihole
    image: pihole/pihole:2024.07.0
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "67:67/udp" # DHCP (Optional)
      - "8000:80"   # Admin UI
    environment:
      TZ: 'America/Los_Angeles'
      WEBPASSWORD: 'REPLACE_ME_WITH_A_SECURE_PASSWORD'
      FTLCONF_LOCAL_IPV4: '10.0.0.169'
      DNSMASQ_USER: 'root'
      INTERFACE: 'eth0'
      PIHOLE_DNS_: '8.8.8.8;1.1.1.1'
    volumes:
      - 'pihole_data:/etc/pihole'
      - 'dnsmasq_data:/etc/dnsmasq.d'
    cap_add:
      - NET_ADMIN
    restart: always

volumes:
  pihole_data:
  dnsmasq_data:

  # Alternative: Simple Squid Proxy (Uncomment to use instead of v2ray)
  # squid:
  #   image: ubuntu/squid:latest
  #   container_name: nas_squid
  #   restart: always
  #   ports:
  #     - "3128:3128"
