version: '3.8'

services:
  # High-performance proxy relay
  # This setup uses v2ray which is excellent for complex Chinese routing
  nas_proxy:
    image: v2fly/v2fly-core:latest
    container_name: nas_proxy
    restart: always
    ports:
      - '1080:1080' # SOCKS5 Port
      - '8080:8080' # HTTP Proxy Port
    volumes:
      - ./config:/etc/v2ray
      - ./logs:/var/log/v2ray
    command: run -d /etc/v2ray

  # Tianditu Map Tile Accelerator
  # Caches Chinese map tiles locally on the NAS to bypass slow exit nodes
  tile_cache:
    build:
      context: .
      dockerfile: Dockerfile.tile_cache
    container_name: tile_cache
    restart: always
    ports:
      - '8082:8082'
    volumes:
      - ./tiles:/app/tiles
      - ./proxies.html:/app/proxies.html:ro
      - ./tile_storage.bin:/app/tile_storage.bin
    environment:
      PROXY_FILE: '/app/proxies.html'
      TILE_STORAGE_LIB: '/app/libtilestorage.so'

  # Network-wide ad blocking
  pihole:
    container_name: pihole
    image: pihole/pihole:2024.07.0
    env_file:
      - .env
    ports:
      - '53:53/tcp'
      - '53:53/udp'
      - '67:67/udp' # DHCP (Optional)
      - '8000:80' # Admin UI
    environment:
      TZ: 'America/Los_Angeles'
      WEBPASSWORD: ${PIHOLE_PASSWORD:-REPLACE_ME_WITH_A_SECURE_PASSWORD}
      FTLCONF_LOCAL_IPV4: '10.0.0.169'
      DNSMASQ_USER: 'root'
      INTERFACE: 'eth0'
      PIHOLE_DNS_: '8.8.4.4;1.1.1.1' # Adding Google Secondary and Cloudflare
    volumes:
      - 'pihole_etc:/etc/pihole'
      - 'pihole_dnsmasq:/etc/dnsmasq.d'
      - './proxies.html:/var/www/html/proxies.html:ro' # Direct root access
    cap_add:
      - NET_ADMIN
    restart: always

  # SOCKS5 Connection Pooler
  # Maintains persistent SOCKS5 connections, eliminates per-request handshakes
  conn_pool:
    container_name: conn_pool
    image: ubuntu:24.04
    restart: always
    ports:
      - '8083:8083'
    volumes:
      - '.:/app'
    working_dir: /app
    command: ./conn_pool
    depends_on:
      - nas_proxy

  # SOCKS5-to-HTTP Bridge
  # Browser connects via fast HTTP CONNECT, NAS handles SOCKS5 protocol
  # with auto-failover between verified Chinese proxies
  proxy_bridge:
    container_name: proxy_bridge
    image: python:3.12-slim
    restart: always
    ports:
      - '3128:3128'
    volumes:
      - './cache_proxy.py:/app/cache_proxy.py:ro'
      - './proxies.html:/app/proxies.html:ro'
    working_dir: /app
    command: python3 cache_proxy.py

  # Automated Proxy Scraper + Verifier
  # Scrapes, health-checks, and deploys proxies every hour (all in C)
  refresher:
    container_name: nas_refresher
    image: ubuntu:24.04
    volumes:
      - '.:/app'
    working_dir: /app
    command: /bin/bash -c "while true; do ./proxy_scraper; sleep 3600; done"
    restart: always
    depends_on:
      - nas_proxy

  # Proxy Health Monitor
  # Continuously pings proxies every 30s, removes dead ones between scraper cycles
  proxy_monitor:
    container_name: proxy_monitor
    image: ubuntu:24.04
    restart: always
    volumes:
      - '.:/app'
    working_dir: /app
    command: ./proxy_monitor
    depends_on:
      - nas_proxy

volumes:
  # Using named volumes for NAS stability
  pihole_etc:
  pihole_dnsmasq:
