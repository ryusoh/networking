version: '3.8'

services:
  # High-performance proxy relay
  # This setup uses v2ray which is excellent for complex Chinese routing
  nas_proxy:
    image: v2fly/v2fly-core:latest
    container_name: nas_proxy
    restart: always
    ports:
      - '1080:1080' # SOCKS5 Port
      - '8080:8080' # HTTP Proxy Port
    volumes:
      - ./config:/etc/v2ray
      - ./logs:/var/log/v2ray
    command: run -c /etc/v2ray/config.json

  # Tianditu Map Tile Accelerator
  # Caches Chinese map tiles locally on the NAS to bypass slow exit nodes
  tile_cache:
    build:
      context: .
      dockerfile: Dockerfile.tile_cache
    container_name: tile_cache
    restart: always
    ports:
      - '8082:8082'
    volumes:
      - ./tiles:/app/tiles
    environment:
      PROXY_URL: 'http://nas_proxy:8080'
    depends_on:
      - nas_proxy

  # Network-wide ad blocking
  pihole:
    container_name: pihole
    image: pihole/pihole:2024.07.0
    env_file:
      - .env
    ports:
      - '53:53/tcp'
      - '53:53/udp'
      - '67:67/udp' # DHCP (Optional)
      - '8000:80' # Admin UI
    environment:
      TZ: 'America/Los_Angeles'
      WEBPASSWORD: ${PIHOLE_PASSWORD:-REPLACE_ME_WITH_A_SECURE_PASSWORD}
      FTLCONF_LOCAL_IPV4: '10.0.0.169'
      DNSMASQ_USER: 'root'
      INTERFACE: 'eth0'
      PIHOLE_DNS_: '8.8.4.4;1.1.1.1' # Adding Google Secondary and Cloudflare
    volumes:
      - 'pihole_etc:/etc/pihole'
      - 'pihole_dnsmasq:/etc/dnsmasq.d'
      - './proxies.html:/var/www/html/proxies.html:ro' # Direct root access
    cap_add:
      - NET_ADMIN
    restart: always

  # Real-time User-space AdBlocker
  # Uses Raw Sockets to monitor and drop malicious traffic
  blocker:
    container_name: nas_blocker
    image: ubuntu:24.04
    network_mode: "host" # Crucial for Raw Socket access
    volumes:
      - '.:/app'
    working_dir: /app
    command: ./userspace_blocker eth0
    restart: always
    depends_on:
      - pihole

volumes:
  # Using named volumes for NAS stability
  pihole_etc:
  pihole_dnsmasq:
